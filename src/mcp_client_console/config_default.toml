# mcp-client-console configuration

# --- SETUP BELOW ---
### This default file was created on first package run.
### Edit the values below, save, and run the package again to begin.

#------------------------
# --- SERVER SETTINGS ---
#------------------------


# [[server]] EXAMPLE
# name = "name of remote machine"
# url = "address to remote machine server"
# token = "bearer token for remote machine server"

[[server]]
name = "Box_1"
url = "http://127.0.0.1:9000/mcp"
token = "paste your token here"

[[server]]
name = "Box_2"
url = "http://127.0.0.1:9001/mcp"
token = "paste your token here"

[[server]]
name = "Box_3"
url = "http://127.0.0.1:9002/mcp"
token = "paste your token here"

### Add additional [[server]] names and urls as needed.

#---------------------
# --- LLM SETTINGS ---
#---------------------

[llm]
provider = "local"      # "local" or "api" (where your LLM is located)
max_steps = 6           # max tool calls per message (save tokens/runaway loops)

[llm.local]
model = "llama3.1:8b"           # get your tag exactly as listed by command: ollama list
host = "http//127.0.0.1:11434"  # where ollama server listens

[llm.api]
model = "claude-mythos"         # any cloud model for which you have API key








